# ============================================================
#  Innova JM — Configuración Netlify
#  Drag & drop esta carpeta completa en netlify.com
# ============================================================

[build]
  publish = "."

# ---- Forzar HTTPS + www en todas las URLs ----
[[redirects]]
  from   = "http://innovajm.com/*"
  to     = "https://www.innovajm.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.innovajm.com/*"
  to     = "https://www.innovajm.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://innovajm.com/*"
  to     = "https://www.innovajm.com/:splat"
  status = 301
  force  = true

# ---- Cabeceras de seguridad para todas las páginas ----
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection           = "1; mode=block"
    Content-Security-Policy    = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self';"

# ---- Cache para assets estáticos ----
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
